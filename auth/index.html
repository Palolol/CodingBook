<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth — Register &amp; Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="card">
    <div class="logo"><span class="logo-dot"></span>Vault Auth</div>

    <!-- Auth Forms -->
    <div id="authView">
      <div class="tab-bar">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN -->
      <form class="form active" id="loginForm" onsubmit="handleLogin(event)">
        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
          <span class="hint" id="loginEmailHint"></span>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
          <span class="hint" id="loginPasswordHint"></span>
        </div>
        <button type="submit" class="btn">Access Vault</button>
      </form>

      <!-- REGISTER -->
      <form class="form" id="registerForm" onsubmit="handleRegister(event)">
        <div class="field">
          <label>Username</label>
          <input type="text" id="regUsername" placeholder="handle" autocomplete="username" oninput="clearHint('regUsernameHint')">
          <span class="hint" id="regUsernameHint"></span>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" oninput="clearHint('regEmailHint')">
          <span class="hint" id="regEmailHint"></span>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="min 6 characters" autocomplete="new-password" oninput="updateStrength()">
          <div class="strength-bar">
            <div class="strength-seg" id="s1"></div>
            <div class="strength-seg" id="s2"></div>
            <div class="strength-seg" id="s3"></div>
          </div>
          <span class="hint" id="regPasswordHint"></span>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="regConfirm" placeholder="repeat password" autocomplete="new-password" oninput="clearHint('regConfirmHint')">
          <span class="hint" id="regConfirmHint"></span>
        </div>
        <button type="submit" class="btn">Create Account</button>
      </form>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
      <div>
        <div class="welcome-label">Authenticated as</div>
        <div class="welcome-name" id="dashName">—</div>
      </div>
      <div class="info-block">
        <div class="info-row">
          <span class="info-key">Email</span>
          <span class="info-val" id="dashEmail">—</span>
        </div>
        <div class="info-row">
          <span class="info-key">User ID</span>
          <span class="info-val" id="dashUID">—</span>
        </div>
        <div class="info-row">
          <span class="info-key">Member since</span>
          <span class="info-val" id="dashDate">—</span>
        </div>
      </div>
      <div class="json-block">
        <div class="json-label">Firestore — user profile</div>
        <pre id="jsonPreview"></pre>
      </div>
      <button class="btn-outline" onclick="handleLogout()">Sign out</button>
    </div>

    <!-- Loading Overlay -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Firebase compat SDK (no ES modules — works with file://) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- App scripts in order -->
  <script src="js/firebase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
